<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2048 Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #faf8ef;
    }
    h1 { color: #776e65; }
    #game {
      width: 320px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: #bbada0;
      padding: 10px;
      border-radius: 10px;
    }
    .tile {
      width: 70px;
      height: 70px;
      background: #cdc1b4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div id="game"></div>

  <script>
    const game = document.getElementById("game");
    let grid = Array(16).fill(0);

    function draw() {
      game.innerHTML = "";
      grid.forEach(val => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = val === 0 ? "" : val;
        game.appendChild(tile);
      });
    }

    function addTile() {
      let empty = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
      if (empty.length === 0) return;
      let index = empty[Math.floor(Math.random() * empty.length)];
      grid[index] = Math.random() < 0.9 ? 2 : 4;
    }

    function slide(row) {
      row = row.filter(v => v);
      for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i + 1]) {
          row[i] *= 2;
          row[i + 1] = 0;
        }
      }
      row = row.filter(v => v);
      while (row.length < 4) row.push(0);
      return row;
    }

    function moveLeft() {
      for (let i = 0; i < 4; i++) {
        let row = grid.slice(i * 4, i * 4 + 4);
        row = slide(row);
        for (let j = 0; j < 4; j++) grid[i * 4 + j] = row[j];
      }
    }

    function rotate() {
      let newGrid = Array(16).fill(0);
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          newGrid[c * 4 + (3 - r)] = grid[r * 4 + c];
        }
      }
      grid = newGrid;
    }

    function move(direction) {
      let rotations = {
        ArrowUp: 1,
        ArrowRight: 2,
        ArrowDown: 3,
        ArrowLeft: 0
      }[direction];

      for (let i = 0; i < rotations; i++) rotate();
      moveLeft();
      for (let i = 0; i < (4 - rotations) % 4; i++) rotate();

      addTile();
      draw();
    }

    document.addEventListener("keydown", e => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        move(e.key);
      }
    });

    addTile();
    addTile();
    draw();
  </script>
</body>
</html>
