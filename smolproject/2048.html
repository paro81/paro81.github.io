<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3^n Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #faf8ef;
    }
    h1 { color: #776e65; }
    #game {
      width: 340px;
      margin: 20px auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: #bbada0;
      padding: 10px;
      border-radius: 10px;
      position: relative;
    }
    .tile {
      width: 75px;
      height: 75px;
      background: #cdc1b4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 5px;
      transition: all 0.15s ease-in-out;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(238, 228, 218, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: #776e65;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Power of 3 (3ⁿ)</h1>
  <div id="game"></div>
  <div id="overlay">Game Over</div>

  <script>
    const game = document.getElementById("game");
    const overlay = document.getElementById("overlay");
    let grid = Array(16).fill(0);

    function draw() {
      game.innerHTML = "";
      grid.forEach(val => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = val === 0 ? "" : val;
        game.appendChild(tile);
      });
    }

    function addTile() {
      let empty = grid.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
      if (empty.length === 0) return;
      let index = empty[Math.floor(Math.random() * empty.length)];
      grid[index] = Math.random() < 0.9 ? 3 : 9;
    }

    function slide(row) {
      row = row.filter(v => v);
      for (let i = 0; i < row.length - 1; i++) {
        if (row[i] === row[i + 1]) {
          row[i] *= 3;
          row[i + 1] = 0;
        }
      }
      row = row.filter(v => v);
      while (row.length < 4) row.push(0);
      return row;
    }

    function moveLeft() {
      let moved = false;
      for (let i = 0; i < 4; i++) {
        let row = grid.slice(i * 4, i * 4 + 4);
        let newRow = slide(row);
        if (row.toString() !== newRow.toString()) moved = true;
        for (let j = 0; j < 4; j++) grid[i * 4 + j] = newRow[j];
      }
      return moved;
    }

    function rotate() {
      let newGrid = Array(16).fill(0);
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 4; c++) {
          newGrid[c * 4 + (3 - r)] = grid[r * 4 + c];
        }
      }
      grid = newGrid;
    }

    function canMove() {
      for (let i = 0; i < 16; i++) {
        if (grid[i] === 0) return true;
      }
      for (let r = 0; r < 4; r++) {
        for (let c = 0; c < 3; c++) {
          if (grid[r * 4 + c] === grid[r * 4 + c + 1]) return true;
        }
      }
      for (let c = 0; c < 4; c++) {
        for (let r = 0; r < 3; r++) {
          if (grid[r * 4 + c] === grid[(r + 1) * 4 + c]) return true;
        }
      }
      return false;
    }

    function move(direction) {
      if (overlay.style.display === "flex") return;

      let rotations = {
        ArrowUp: 1,
        ArrowRight: 2,
        ArrowDown: 3,
        ArrowLeft: 0
      }[direction];

      for (let i = 0; i < rotations; i++) rotate();
      let moved = moveLeft();
      for (let i = 0; i < (4 - rotations) % 4; i++) rotate();

      if (moved) {
        addTile();
        draw();
        if (!canMove()) {
          overlay.style.display = "flex";
        }
      }
    }

    document.addEventListener("keydown", e => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        move(e.key);
      }
    });

    addTile();
    addTile();
    draw();
  </script>
</body>
</html>
